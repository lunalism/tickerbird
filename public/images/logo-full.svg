<!-- Tickerbird 풀 로고 (아이콘 + 텍스트) -->
<!-- 왼쪽 아이콘, 오른쪽 "Tickerbird" 텍스트 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <!-- 아이콘 영역 (0~48) -->
  <g transform="translate(4, 4) scale(0.625)">
    <!-- 주식 차트 상승선 (꼬리 부분) -->
    <path
      d="M8 48 L20 40 L30 44 L40 28"
      stroke="#0ea5e9"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <!-- 새 몸통 (위로 날아오르는 형태) -->
    <path
      d="M40 28 C42 24, 46 18, 50 14 C48 20, 50 24, 56 26 C52 26, 48 28, 46 32 C44 30, 42 29, 40 28Z"
      fill="#0ea5e9"
    />
    <!-- 새 날개 (펼친 형태) -->
    <path
      d="M44 26 C40 20, 34 16, 26 14 C32 18, 36 22, 40 28"
      fill="#10b981"
    />
    <!-- 상승 화살표 끝 강조점 -->
    <circle cx="50" cy="14" r="2.5" fill="#0ea5e9" />
  </g>
  <!-- 텍스트 영역 -->
  <text
    x="52"
    y="31"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="600"
    fill="#0f172a"
    letter-spacing="-0.02em"
  >Tickerbird</text>
</svg>
